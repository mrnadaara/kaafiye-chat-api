<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <style>
            /* Keep your styles here, but remember inlining is better for production */
            .button {
                font: bold 11px Arial;
                text-decoration: none;
                background-color: #EEEEEE;
                color: #333333;
                padding: 10px 15px;
                border: 1px solid #333333;
                display: inline-block;
            }
        </style>
    </head>
    <body>
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <span>Kaafiye Chat</span>
            <h2>Change Email</h2>
            <span><%= date %></span>
        </header>
        <main style="text-align: center; padding: 40px;">
            <p>You requested an email change.</p>
            <h4>Click below to verify:</h4>
            
            <a class="button" href="<%= verifyEmailLink %>">Verify Email</a>
            
            <p style="margin-top: 20px;">
                <a href="<%= verifyEmailLink %>"><%= verifyEmailLink %></a>
            </p>
        </main>
        <footer style="text-align: center; font-size: 12px; color: #666;">
            Contact us at enquiry@kaafiye-chat.so
        </footer>
    </body>
</html>
